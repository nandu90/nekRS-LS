- 
  action: "add_pipelines"
  pipelines:
    pl1:
      f1:
        type: "slice"
        params:
          point:
            x: 0.0
            y: 0.0
            z: 0.0
          normal:
            x: 1.0
            y: 0.0
            z: 0.0
- 
  action: "add_scenes"
  scenes:
    s1:
      plots:
        p1:
          type: "pseudocolor"
          field: "vel_z"
          pipeline: "pl1"
          color_table:
            name: "Cool to Warm Extended"
          min_value: 0.0
          max_value: 1.0
      renders:
        r1:
          camera:
            azimuth: 90
            zoom: 4.0
          image_prefix: "vz_%06d"
          world_annotations: false
          screen_annotations: false
          image_width: 1024
          image_height: 256
